<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Smooth Camera Game Test v1.4.16</title>
  <style>
    :root{color-scheme:dark;--ink:#f8fafc;--muted:#cbd5e1;--panel:#111827;--red:#dc2626}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--panel);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #game-wrapper{position:fixed;inset:0;width:100%;height:100%;border:0;background:var(--panel)}
    #loading{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;padding:24px;color:var(--ink);background:var(--panel);text-align:center;transition:opacity .2s ease}
    #loading.hidden{opacity:0;pointer-events:none}#loading strong{display:block;font-size:1.18rem}#loading span{display:block;max-width:430px;margin-top:7px;color:var(--muted);font-size:.92rem;line-height:1.45}
    #loading button{margin-top:16px;padding:11px 19px;color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:10px;background:var(--red);font:inherit;font-weight:850;cursor:pointer}
  </style>
</head>
<body>
  <iframe id="game-wrapper" title="Peterborough simulator smooth camera test"></iframe>
  <div id="loading"><div><strong>Smooth Camera Game Test <span style="color:#38bdf8">v1.4.16</span></strong><span id="loading-status">Loading the real simulator, steering, road boundaries, and position-locked camera…</span><button id="retry" type="button" hidden>Retry</button></div></div>
  <script>
    (() => {
      'use strict';
      const VERSION = '1.4.16';
      const wrapper = document.getElementById('game-wrapper');
      const loading = document.getElementById('loading');
      const loadingStatus = document.getElementById('loading-status');
      const retry = document.getElementById('retry');
      const sleep = milliseconds => new Promise(resolve => setTimeout(resolve, milliseconds));
      const mobile = matchMedia('(pointer:coarse)').matches || innerWidth < 850;
      wrapper.src = new URL(mobile ? '../mobile/index.html' : '../play/index.html', location.href).href + `?cameraTest=${VERSION}`;

      retry.addEventListener('click', () => location.reload());

      async function waitFor(readValue, label, timeoutMilliseconds = 30000) {
        const startedAt = performance.now();
        while (true) {
          const value = readValue();
          if (value) return value;
          if (performance.now() - startedAt > timeoutMilliseconds) throw new Error(`${label} did not become ready in time.`);
          await sleep(50);
        }
      }

      async function install() {
        loadingStatus.textContent = mobile ? 'Loading the real mobile driving controls…' : 'Loading the real desktop simulator…';
        const wrapperDocument = await waitFor(() => wrapper.contentDocument?.readyState === 'complete' && wrapper.contentDocument, 'Simulator wrapper');
        const gameFrame = await waitFor(() => wrapperDocument.getElementById('simulator'), 'Simulator frame');
        const game = await waitFor(() => gameFrame.contentWindow, 'Simulator window');
        const gameDocument = await waitFor(() => gameFrame.contentDocument?.readyState === 'complete' && gameFrame.contentDocument, 'Base game');

        loadingStatus.textContent = 'Waiting for steering and road boundaries…';
        await waitFor(() => game.PTBO_SIMULATOR_READY, 'Simulator startup verifier');
        await game.PTBO_SIMULATOR_READY;

        loadingStatus.textContent = 'Installing the position-locked smooth camera…';
        let script = gameDocument.querySelector('script[data-ptbo-smooth-camera-test]');
        if (!script) {
          script = gameDocument.createElement('script');
          script.src = new URL(`../smooth-heading-camera-${VERSION}.js?v=${VERSION}`, location.href).href;
          script.setAttribute('data-ptbo-smooth-camera-test', 'true');
          const scriptReady = new Promise((resolve, reject) => {
            script.addEventListener('load', () => { script.dataset.loaded = 'true'; resolve(); }, { once:true });
            script.addEventListener('error', () => reject(new Error('Smooth camera script failed to load.')), { once:true });
          });
          gameDocument.body.appendChild(script);
          await scriptReady;
        } else if (script.dataset.loaded !== 'true' && !game.PTBO_SMOOTH_HEADING_CAMERA_READY) {
          await new Promise((resolve, reject) => {
            script.addEventListener('load', resolve, { once:true });
            script.addEventListener('error', () => reject(new Error('Smooth camera script failed to load.')), { once:true });
          });
        }

        await waitFor(() => game.PTBO_SMOOTH_HEADING_CAMERA_READY, 'Smooth camera');
        await game.PTBO_SMOOTH_HEADING_CAMERA_READY;
        loadingStatus.textContent = 'Position-locked smooth camera ready';
        loading.classList.add('hidden');
        setTimeout(() => loading.remove(), 250);
      }

      function showError(error) {
        console.error('Camera game test failed.', error);
        loadingStatus.textContent = `The test did not finish loading: ${error.message || error}`;
        retry.hidden = false;
      }

      wrapper.addEventListener('load', () => install().catch(showError), { once:true });
    })();
  </script>
</body>
</html>
