<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Peterborough Dispatch Simulator</title>
  <style>
    :root{color-scheme:dark;--panel:rgba(8,13,24,.96);--border:rgba(255,255,255,.2);--ink:#f8fafc;--muted:#cbd5e1}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#111827;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #simulator{position:fixed;inset:0;width:100%;height:100%;border:0;background:#111827}
    #audio-button{position:fixed;top:15px;right:145px;z-index:5000;width:42px;height:42px;display:grid;place-items:center;padding:0;color:var(--ink);border:1px solid var(--border);border-radius:12px;background:var(--panel);box-shadow:0 6px 20px #0006;cursor:pointer}
    #audio-button svg{width:22px;height:22px;stroke:currentColor}.speaker-off{display:none}#audio-button.muted{color:#9ca3af}#audio-button.muted .speaker-on{display:none}#audio-button.muted .speaker-off{display:block}
    #loading{position:fixed;inset:0;z-index:6000;display:grid;place-items:center;padding:24px;color:var(--ink);background:#111827;text-align:center;transition:opacity .18s ease}#loading.hidden{opacity:0;pointer-events:none}#loading strong{display:block;font-size:1.15rem}#loading span{display:block;margin-top:6px;color:var(--muted);font-size:.9rem;line-height:1.45}#loading button{margin-top:16px;padding:10px 18px;color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:9px;background:#dc2626;font:inherit;font-weight:800;cursor:pointer}
    @media(max-width:900px),(pointer:coarse){#audio-button{display:none}}
  </style>
</head>
<body>
  <iframe id="simulator" src="../index.html?v=1.5.0" title="Peterborough Fire and Emergency Dispatch Simulator"></iframe>
  <button id="audio-button" type="button" aria-label="Mute dispatch voice" aria-pressed="true">
    <svg class="speaker-on" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6M17.5 6.5a7.5 7.5 0 0 1 0 11"/></svg>
    <svg class="speaker-off" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="m16 9 5 5M21 9l-5 5"/></svg>
  </button>
  <div id="loading"><div><strong>Loading Peterborough roads</strong><span id="loading-status">Preparing steering, road boundaries, and dispatch data…</span></div></div>
  <script src="../../shared/build-version.js?v=1.5.0"></script>
  <script src="../../shared/dispatch-locations.js?v=1.4.20"></script>
  <script src="../../shared/dispatch-data-1.4.4.js?v=1.4.20"></script>
  <script src="../../shared/dispatch-override-1.4.4.js?v=1.4.20"></script>
  <script src="../../shared/stations.js?v=1.4.20"></script>
  <script>
    (() => {
      const VERSION = '1.5.0';
      const AUDIO_KEY = 'ptboDispatchVoiceEnabled';
      const frame = document.getElementById('simulator');
      const audioButton = document.getElementById('audio-button');
      const loading = document.getElementById('loading');
      const loadingStatus = document.getElementById('loading-status');
      const stations = window.PTBO_STATIONS || [];
      let voiceEnabled = localStorage.getItem(AUDIO_KEY) !== 'false';
      let selectedStationNumber = 1;
      window.ptboDispatchVoiceEnabled = () => voiceEnabled;
      window.ptboGetSelectedStationNumber = () => selectedStationNumber;
      window.ptboSetSelectedStation = number => { selectedStationNumber = Number(number) || 1; };

      function updateAudio() {
        audioButton.classList.toggle('muted', !voiceEnabled);
        audioButton.setAttribute('aria-pressed', String(voiceEnabled));
        audioButton.setAttribute('aria-label', voiceEnabled ? 'Mute dispatch voice' : 'Turn on dispatch voice');
      }
      audioButton.addEventListener('click', () => {
        voiceEnabled = !voiceEnabled;
        localStorage.setItem(AUDIO_KEY, String(voiceEnabled));
        if (!voiceEnabled) frame.contentWindow?.speechSynthesis?.cancel?.();
        updateAudio();
      });
      updateAudio();

      function injectScript(doc, filename, marker) {
        return new Promise((resolve, reject) => {
          const existing = doc.querySelector(`script[${marker}]`);
          if (existing) {
            if (existing.dataset.ptboLoaded === 'true') return resolve(existing);
            existing.addEventListener('load', () => resolve(existing), { once:true });
            existing.addEventListener('error', () => reject(new Error(`Unable to load ${filename}.`)), { once:true });
            return;
          }
          const script = doc.createElement('script');
          script.src = new URL(`../${filename}?v=${VERSION}`, location.href).href;
          script.setAttribute(marker, 'true');
          script.onload = () => { script.dataset.ptboLoaded = 'true'; resolve(script); };
          script.onerror = () => reject(new Error(`Unable to load ${filename}.`));
          doc.body.appendChild(script);
        });
      }

      function installDispatchVoice(doc) {
        const helper = doc.createElement('script');
        helper.textContent = `(() => {
          const STATIONS = ${JSON.stringify(stations)};
          const stationName = number => (STATIONS.find(station => station.number === Number(number)) || {name:'Station 1'}).name;
          const callNames = {'Structure Fire':'a structure fire','Water & Ice Rescue':'a water rescue','Auto Alarm / Vehicle Fire':'an auto alarm','Burning Complaint':'a burning complaint','Alarms No Apparent Problem':'an alarm with no apparent problem','Chest Pain / Cardiac Emergency':'a cardiac emergency','Difficulty Breathing':'difficulty breathing','Unconscious Patient / Substance Overdose':'an unconscious patient or possible overdose','Rectal Bleed / Gastrointestinal Emergency':'a gastrointestinal emergency','Lift Assist / Public Service':'a lift assist','Request for Access / Wellness Check':'a request for access or wellness check'};
          window.buildPeterboroughDispatchPhrase = incident => {
            if (!incident) return '';
            const primary = Number(parent.ptboGetSelectedStationNumber?.() || 1);
            if (['Structure Fire','Water & Ice Rescue','Auto Alarm / Vehicle Fire'].includes(incident.sub)) return 'All stations from Peterborough Control, you’re responding to ' + callNames[incident.sub] + ' at ' + incident.name + ', ' + incident.addr + '.';
            if (incident.sub === 'Motor Vehicle Collision') {
              const secondary = STATIONS.filter(station => station.number !== primary).sort((a,b) => mapInstance.distance([a.lat,a.lng],[incident.lat,incident.lng]) - mapInstance.distance([b.lat,b.lng],[incident.lat,incident.lng]))[0];
              return stationName(primary) + ' and ' + stationName(secondary?.number) + ' from Peterborough Control, you’re responding to an M V C at the intersection ' + incident.addr + '.';
            }
            return stationName(primary) + ' from Peterborough Control, you’re responding to ' + (callNames[incident.sub] || incident.sub.toLowerCase()) + ' at the address ' + incident.addr + '.';
          };
          playDispatchAudioText = () => {
            if (!parent.ptboDispatchVoiceEnabled?.()) return;
            try {
              speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(window.buildPeterboroughDispatchPhrase(activeIncident));
              utterance.rate = 1;
              utterance.pitch = .95;
              speechSynthesis.speak(utterance);
            } catch (error) { console.warn('TTS engine failure:', error); }
          };
          window.playDispatchAudioText = playDispatchAudioText;
        })();`;
        doc.body.appendChild(helper);
      }

      function showStartupError(error) {
        console.error('Simulator startup failed.', error);
        loading.innerHTML = '<div><strong>Simulator did not finish loading</strong><span>Steering or road boundaries could not initialize. Retry to load the protected driving mode.</span><button type="button" id="startup-retry">Retry</button></div>';
        document.getElementById('startup-retry')?.addEventListener('click', () => location.reload());
      }

      frame.addEventListener('load', () => {
        const doc = frame.contentDocument;
        const game = frame.contentWindow;
        if (!doc || !game || typeof game.initializeSimulator !== 'function') return;
        installDispatchVoice(doc);
        injectScript(doc, 'route-compare-1.4.2.js', 'data-ptbo-route-compare-core').catch(console.error);
        injectScript(doc, 'route-review-ui-1.4.3.js', 'data-ptbo-route-review-ui').catch(console.error);
        loadingStatus.textContent = 'Connecting vehicle controls and road boundaries…';

        const simulatorReady = injectScript(doc, 'simulator-readiness-1.4.5.js', 'data-ptbo-simulator-readiness')
          .then(() => game.PTBO_SIMULATOR_READY || Promise.reject(new Error('Startup verifier was not created.')));
        const dispatchReady = window.PTBO_DISPATCH_STORE.ready();

        Promise.all([dispatchReady, simulatorReady])
          .then(() => {
            loadingStatus.textContent = 'Simulator ready';
            loading.classList.add('hidden');
            setTimeout(() => loading.remove(), 250);
          })
          .catch(showStartupError);
      });
    })();
  </script>
</body>
</html>
