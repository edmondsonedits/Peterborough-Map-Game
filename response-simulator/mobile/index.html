<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <title>Peterborough Dispatch Simulator — Mobile</title>
  <style>
    :root{color-scheme:dark;--panel:rgba(17,24,39,.93);--strong:rgba(8,13,24,.97);--border:rgba(255,255,255,.2);--ink:#f8fafc;--muted:#cbd5e1;--red:#dc2626}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;background:#111827;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-user-select:none;user-select:none}
    #simulator{position:fixed;inset:0;width:100%;height:100%;border:0;background:#111827}
    .mobile-topbar{position:fixed;top:calc(10px + env(safe-area-inset-top));left:10px;right:10px;z-index:5000;display:grid;grid-template-columns:46px minmax(0,1fr) 100px;align-items:center;gap:8px;pointer-events:none;transition:opacity .15s,visibility .15s}
    .top-actions{display:flex;gap:8px;pointer-events:auto}.top-actions:last-child{justify-content:flex-end}
    .top-button,.utility-button{width:46px;height:46px;display:grid;place-items:center;padding:0;color:var(--ink);border:1px solid var(--border);border-radius:14px;background:var(--strong);box-shadow:0 6px 20px rgba(0,0,0,.38);text-decoration:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .top-button:active,.utility-button:active{transform:scale(.94)}
    .top-button svg,.utility-button svg{width:23px;height:23px;stroke:currentColor}.speaker-off{display:none}.top-button.muted{color:#9ca3af}.top-button.muted .speaker-on{display:none}.top-button.muted .speaker-off{display:block}
    .station-shortcuts{width:min(100%,248px);justify-self:center;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;pointer-events:auto}
    .station-button{min-width:0;height:40px;padding:0 5px;color:#e5e7eb;border:1px solid var(--border);border-radius:11px;background:rgba(17,24,39,.92);box-shadow:0 5px 16px rgba(0,0,0,.3);font:inherit;font-size:9.5px;font-weight:850;white-space:nowrap;touch-action:manipulation}.station-button.active{color:#fff;border-color:rgba(239,68,68,.75);background:rgba(185,28,28,.94)}
    .mobile-controls{position:fixed;left:0;right:0;bottom:0;z-index:4900;min-height:174px;padding:12px max(14px,env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));display:grid;grid-template-columns:minmax(132px,1fr) auto minmax(132px,1fr);align-items:end;gap:10px;pointer-events:none;background:linear-gradient(to top,rgba(5,10,20,.84),rgba(5,10,20,0));transition:opacity .15s,visibility .15s}
    .steering-zone,.pedal-zone,.utility-zone{pointer-events:auto}.steering-zone{display:flex;align-items:end;justify-content:flex-start}
    .joystick{position:relative;width:132px;height:132px;border:1px solid var(--border);border-radius:50%;background:radial-gradient(circle at center,rgba(255,255,255,.06) 0 35%,transparent 36%),var(--panel);box-shadow:inset 0 0 28px rgba(0,0,0,.36),0 8px 24px rgba(0,0,0,.35);touch-action:none}
    .joystick::before{position:absolute;left:16px;right:16px;top:50%;height:2px;content:"";background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)}
    .joystick-label{position:absolute;left:0;right:0;bottom:13px;color:rgba(255,255,255,.58);font-size:10px;font-weight:800;letter-spacing:.13em;text-align:center;text-transform:uppercase;pointer-events:none}
    .joystick-thumb{position:absolute;left:50%;top:50%;width:62px;height:62px;display:grid;place-items:center;color:var(--ink);border:2px solid rgba(255,255,255,.45);border-radius:50%;background:linear-gradient(145deg,#374151,#111827);box-shadow:0 7px 17px rgba(0,0,0,.45);transform:translate(-50%,-50%);transition:transform 90ms ease;pointer-events:none}.joystick.active .joystick-thumb{transition:none}.joystick-thumb svg{width:34px;height:34px;stroke:currentColor}
    .utility-zone{display:flex;flex-direction:column;align-items:center;gap:9px;padding-bottom:8px}.utility-button{width:48px;height:48px;border-radius:50%;background:var(--panel)}.utility-button.active{color:#fff;border-color:rgba(239,68,68,.72);background:rgba(185,28,28,.94)}
    .pedal-zone{display:flex;align-items:flex-end;justify-content:flex-end;gap:10px;touch-action:none}.pedal{width:76px;height:112px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:0;color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.42),inset 0 1px rgba(255,255,255,.16);font:inherit;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;touch-action:none}.pedal svg{width:29px;height:29px;stroke:currentColor}.pedal.reverse{height:88px;background:linear-gradient(180deg,#374151,#1f2937)}.pedal.accelerate{background:linear-gradient(180deg,#ef2929,#b91c1c)}.pedal.pressed{transform:translateY(5px) scale(.97);filter:brightness(1.18)}
    .loading-cover{position:fixed;inset:0;z-index:6000;display:grid;place-items:center;padding:24px;color:var(--ink);background:#111827;text-align:center;transition:opacity .18s}.loading-cover.hidden{opacity:0;pointer-events:none}.loading-cover strong{display:block;font-size:1.15rem}.loading-cover span{display:block;margin-top:6px;color:var(--muted);font-size:.9rem;line-height:1.45}.loading-cover button{margin-top:16px;padding:11px 20px;color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:10px;background:#dc2626;font:inherit;font-weight:850;touch-action:manipulation}.loading-cover button:active{transform:scale(.97)}.loading-cover button:disabled{opacity:.55}
    .control-hint{position:fixed;left:50%;bottom:calc(184px + env(safe-area-inset-bottom));z-index:4950;width:min(88vw,380px);padding:9px 12px;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:999px;background:rgba(8,13,24,.84);font-size:11px;font-weight:700;text-align:center;transform:translateX(-50%);pointer-events:none;animation:fade-hint 5s forwards;transition:opacity .15s,visibility .15s}@keyframes fade-hint{0%,68%{opacity:1}100%{opacity:0;visibility:hidden}}
    @media(max-width:390px){.mobile-topbar{left:7px;right:7px;gap:5px;grid-template-columns:44px minmax(0,1fr) 93px}.station-shortcuts{gap:4px}.station-button{height:38px;padding:0 3px;font-size:8.5px}.top-button{width:44px;height:44px}.top-actions{gap:5px}.mobile-controls{grid-template-columns:126px 48px 142px;gap:7px}.joystick{width:126px;height:126px}.pedal{width:68px}}
    @media(orientation:landscape) and (max-height:560px){.mobile-controls{min-height:136px;grid-template-columns:120px 52px 176px;justify-content:space-between}.joystick{width:112px;height:112px}.joystick-thumb{width:54px;height:54px}.pedal{width:70px;height:98px}.pedal.reverse{height:78px}.utility-zone{flex-direction:row;padding-bottom:0}.control-hint{bottom:calc(142px + env(safe-area-inset-bottom))}}
  </style>
</head>
<body>
  <iframe id="simulator" src="../index.html?v=1.4.6" title="Peterborough Fire and Emergency Dispatch Simulator"></iframe>
  <nav class="mobile-topbar" aria-label="Simulator navigation, audio, and station spawns">
    <div class="top-actions"><a class="top-button" href="../../" aria-label="Return to all games"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></a></div>
    <div class="station-shortcuts">
      <button class="station-button active" type="button" data-station="1">Station 1</button>
      <button class="station-button" type="button" data-station="2">Station 2</button>
      <button class="station-button" type="button" data-station="3">Station 3</button>
    </div>
    <div class="top-actions">
      <button class="top-button" id="audio-button" type="button" aria-label="Mute dispatch voice"><svg class="speaker-on" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15 9a4 4 0 0 1 0 6M17.5 6.5a7.5 7.5 0 0 1 0 11"/></svg><svg class="speaker-off" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="m16 9 5 5M21 9l-5 5"/></svg></button>
      <button class="top-button" id="options-button" type="button" aria-label="Open simulator options"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10M18 7h2M14 5v4M4 17h2M10 17h10M6 15v4M4 12h5M13 12h7M9 10v4"/></svg></button>
    </div>
  </nav>

  <section class="mobile-controls" aria-label="Mobile driving controls">
    <div class="steering-zone"><div class="joystick" id="steering"><div class="joystick-thumb" id="steering-thumb"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2"/><path d="M4.6 10h14.8M12 14v6"/></svg></div><span class="joystick-label">Steer</span></div></div>
    <div class="utility-zone"><button class="utility-button active" id="siren-button" type="button" aria-label="Toggle emergency lights"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 14V9a5 5 0 0 1 10 0v5M5 18h14M8 14h8l1 4H7l1-4ZM4 7 2 6M20 7l2-1M12 3V1"/></svg></button><button class="utility-button" id="recenter-button" type="button" aria-label="Recenter map"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg></button></div>
    <div class="pedal-zone"><button class="pedal reverse" id="reverse-pedal" type="button"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 10 4 4 4-4"/></svg>Reverse</button><button class="pedal accelerate" id="gas-pedal" type="button"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 14 4-4 4 4"/></svg>Gas</button></div>
  </section>

  <div class="control-hint">Drag the wheel to steer · Hold Gas to drive · Hold Reverse to back up</div>
  <div class="loading-cover" id="loading-cover"><div><strong>Loading mobile simulator</strong><span id="loading-status">Preparing steering, road boundaries, and updated calls…</span><button type="button" id="loading-refresh">Refresh Page</button></div></div>

  <script src="../../shared/dispatch-locations.js?v=1.4.6"></script>
  <script src="../../shared/dispatch-data-1.4.4.js?v=1.4.6"></script>
  <script src="../../shared/dispatch-override-1.4.4.js?v=1.4.6"></script>
  <script src="../../shared/stations.js?v=1.4.6"></script>
  <script>
    (() => {
      const VERSION = '1.4.6';
      const MOBILE_ZOOM = 18;
      const AUDIO_KEY = 'ptboDispatchVoiceEnabled';
      const frame = document.getElementById('simulator');
      const loading = document.getElementById('loading-cover');
      const loadingStatus = document.getElementById('loading-status');
      const loadingRefresh = document.getElementById('loading-refresh');
      const steering = document.getElementById('steering');
      const thumb = document.getElementById('steering-thumb');
      const gas = document.getElementById('gas-pedal');
      const reverse = document.getElementById('reverse-pedal');
      const siren = document.getElementById('siren-button');
      const recenter = document.getElementById('recenter-button');
      const options = document.getElementById('options-button');
      const audio = document.getElementById('audio-button');
      const stationButtons = [...document.querySelectorAll('.station-button')];
      const stations = window.PTBO_STATIONS || [];
      let voiceEnabled = localStorage.getItem(AUDIO_KEY) !== 'false';
      let selectedStation = 1;
      let steeringPointer = null;
      let fallbackSteeringKey = null;
      const pressed = new Set();
      const sim = () => frame.contentWindow;
      const haptic = (duration = 8) => navigator.vibrate?.(duration);

      function refreshPage() {
        const button = document.getElementById('loading-refresh') || document.getElementById('startup-retry');
        if (button) button.disabled = true;
        const status = document.getElementById('loading-status');
        if (status) status.textContent = 'Refreshing simulator…';
        const url = new URL(location.href);
        url.searchParams.set('v', VERSION);
        url.searchParams.set('refresh', String(Date.now()));
        location.replace(url.href);
      }
      loadingRefresh?.addEventListener('click', refreshPage);

      window.ptboDispatchVoiceEnabled = () => voiceEnabled;
      window.ptboGetSelectedStationNumber = () => selectedStation;
      window.ptboSetSelectedStation = number => {
        selectedStation = Number(number) || 1;
        stationButtons.forEach(button => button.classList.toggle('active', Number(button.dataset.station) === selectedStation));
      };

      function updateAudio() {
        audio.classList.toggle('muted', !voiceEnabled);
        audio.setAttribute('aria-label', voiceEnabled ? 'Mute dispatch voice' : 'Turn on dispatch voice');
      }

      function dispatchKey(key, down) {
        sim()?.dispatchEvent(new KeyboardEvent(down ? 'keydown' : 'keyup', { key, code:key, bubbles:true, cancelable:true }));
      }

      function sendKey(name, down) {
        if ((down && pressed.has(name)) || (!down && !pressed.has(name))) return;
        down ? pressed.add(name) : pressed.delete(name);
        dispatchKey(name === 'gas' ? 'ArrowUp' : 'ArrowDown', down);
      }

      function setFallbackSteering(value) {
        const nextKey = value < -0.08 ? 'ArrowLeft' : value > 0.08 ? 'ArrowRight' : null;
        if (fallbackSteeringKey === nextKey) return;
        if (fallbackSteeringKey) dispatchKey(fallbackSteeringKey, false);
        fallbackSteeringKey = nextKey;
        if (fallbackSteeringKey) dispatchKey(fallbackSteeringKey, true);
      }

      function bindPedal(button, name) {
        let pointer = null;
        button.addEventListener('pointerdown', event => {
          event.preventDefault();
          pointer = event.pointerId;
          button.setPointerCapture(event.pointerId);
          button.classList.add('pressed');
          sendKey(name, true);
          haptic(10);
        });
        const release = event => {
          if (pointer !== null && event.pointerId !== pointer) return;
          pointer = null;
          button.classList.remove('pressed');
          sendKey(name, false);
        };
        button.addEventListener('pointerup', release);
        button.addEventListener('pointercancel', release);
        button.addEventListener('lostpointercapture', release);
      }

      function setSteering(clientX) {
        const rect = steering.getBoundingClientRect();
        const travel = rect.width * .25;
        const offset = Math.max(-travel, Math.min(travel, clientX - (rect.left + rect.width / 2)));
        const value = offset / Math.max(1, travel);
        thumb.style.transform = `translate(calc(-50% + ${offset}px), -50%)`;
        const instruments = sim()?.PTBO_VEHICLE_INSTRUMENTS;
        if (instruments?.setAnalogSteering) {
          setFallbackSteering(0);
          instruments.setAnalogSteering(value);
        } else {
          setFallbackSteering(value);
        }
      }

      function releaseSteering(event) {
        if (steeringPointer !== null && event?.pointerId !== undefined && event.pointerId !== steeringPointer) return;
        steeringPointer = null;
        steering.classList.remove('active');
        thumb.style.transform = 'translate(-50%,-50%)';
        setFallbackSteering(0);
        sim()?.PTBO_VEHICLE_INSTRUMENTS?.setAnalogSteering?.(0);
      }

      stationButtons.forEach((button, index) => {
        const station = stations[index];
        if (!station) return;
        button.dataset.lat = station.lat;
        button.dataset.lng = station.lng;
        button.addEventListener('click', () => {
          window.ptboSetSelectedStation(station.number);
          sim()?.teleportToStation?.(station.lat, station.lng);
          sim()?.mobileRecenter?.();
          haptic(12);
        });
      });

      audio.addEventListener('click', () => {
        voiceEnabled = !voiceEnabled;
        localStorage.setItem(AUDIO_KEY, String(voiceEnabled));
        if (!voiceEnabled) sim()?.speechSynthesis?.cancel?.();
        updateAudio();
        haptic(10);
      });
      options.addEventListener('click', () => { sim()?.togglePanel?.(); haptic(); });
      siren.addEventListener('click', () => {
        const checkbox = frame.contentDocument?.getElementById('chk-siren');
        if (!checkbox) return;
        checkbox.checked = !checkbox.checked;
        sim()?.updateVehicleChassis?.();
        siren.classList.toggle('active', checkbox.checked);
        haptic(12);
      });
      recenter.addEventListener('click', () => { sim()?.mobileRecenter?.(); haptic(); });

      steering.addEventListener('pointerdown', event => {
        event.preventDefault();
        steeringPointer = event.pointerId;
        steering.setPointerCapture(event.pointerId);
        steering.classList.add('active');
        setSteering(event.clientX);
      });
      steering.addEventListener('pointermove', event => {
        if (event.pointerId !== steeringPointer) return;
        event.preventDefault();
        setSteering(event.clientX);
      });
      steering.addEventListener('pointerup', releaseSteering);
      steering.addEventListener('pointercancel', releaseSteering);
      steering.addEventListener('lostpointercapture', releaseSteering);
      bindPedal(gas, 'gas');
      bindPedal(reverse, 'reverse');

      function injectScript(doc, filename, marker) {
        return new Promise((resolve, reject) => {
          const existing = doc.querySelector(`script[${marker}]`);
          if (existing) {
            if (existing.dataset.ptboLoaded === 'true') return resolve(existing);
            existing.addEventListener('load', () => resolve(existing), { once:true });
            existing.addEventListener('error', () => reject(new Error(`Unable to load ${filename}.`)), { once:true });
            return;
          }
          const script = doc.createElement('script');
          script.src = new URL(`../${filename}?v=${VERSION}`, location.href).href;
          script.setAttribute(marker, 'true');
          script.onload = () => { script.dataset.ptboLoaded = 'true'; resolve(script); };
          script.onerror = () => reject(new Error(`Unable to load ${filename}.`));
          doc.body.appendChild(script);
        });
      }

      function showStartupError(error) {
        console.error('Mobile simulator startup failed.', error);
        loading.innerHTML = '<div><strong>Simulator did not finish loading</strong><span id="loading-status">Steering or road boundaries could not initialize. Refresh the page to retry protected driving mode.</span><button type="button" id="startup-retry">Refresh Page</button></div>';
        document.getElementById('startup-retry')?.addEventListener('click', refreshPage);
      }

      function initializeFrame() {
        const doc = frame.contentDocument;
        const game = frame.contentWindow;
        if (!doc || !game || doc.documentElement.dataset.ptboMobileWrapperInitialized === VERSION) return;
        doc.documentElement.dataset.ptboMobileWrapperInitialized = VERSION;
        const style = doc.createElement('style');
        style.textContent = `#game-home,#menu-toggle{display:none!important}#dispatch-hud{top:calc(66px + env(safe-area-inset-top))!important;left:10px!important;right:10px!important;width:auto!important;max-width:none!important;padding:11px 12px 11px 14px!important;transform:none!important;border-left-width:4px!important;border-radius:14px!important;display:grid!important;grid-template-columns:minmax(0,1fr) 98px!important;align-items:center!important;gap:10px!important}.hud-main{min-width:0!important}.hud-title{font-size:9px!important}.hud-address{font-size:15px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}.hud-meta{font-size:10px!important;line-height:1.3!important}.hud-timer-block{min-width:0!important;margin-left:0!important}.hud-clock-display{font-size:21px!important}.hud-btn{min-height:40px!important;padding:7px 8px!important;border-radius:10px!important;font-size:12px!important}#control-panel{width:min(360px,100vw)!important;z-index:3000!important}.panel-scroll{padding:calc(70px + env(safe-area-inset-top)) 18px calc(190px + env(safe-area-inset-bottom))!important}.leaflet-bottom{bottom:calc(174px + env(safe-area-inset-bottom))!important}#map-orientation-controls{display:none!important}`;
        doc.head.appendChild(style);
        injectScript(doc, 'route-compare-1.4.2.js', 'data-ptbo-route-compare-core').catch(console.error);
        injectScript(doc, 'route-review-ui-1.4.3.js', 'data-ptbo-route-review-ui').catch(console.error);

        const helper = doc.createElement('script');
        helper.textContent = `(() => {
          window.mobileRecenter = () => {
            const lock = document.getElementById('chk-camera');
            if (lock) lock.checked = true;
            if (mapInstance) mapInstance.setView([simLat,simLng], ${MOBILE_ZOOM}, {animate:false});
          };
          setTimeout(window.mobileRecenter, 0);
        })();`;
        doc.body.appendChild(helper);

        loadingStatus.textContent = 'Connecting touch steering and road boundaries…';
        const simulatorReady = injectScript(doc, 'simulator-readiness-1.4.5.js', 'data-ptbo-simulator-readiness')
          .then(() => game.PTBO_SIMULATOR_READY || Promise.reject(new Error('Startup verifier was not created.')));
        const dispatchReady = window.PTBO_DISPATCH_STORE.ready();

        Promise.all([dispatchReady, simulatorReady])
          .then(() => {
            loadingStatus.textContent = 'Simulator ready';
            loading.classList.add('hidden');
            setTimeout(() => loading.remove(), 250);
          })
          .catch(showStartupError);
      }

      frame.addEventListener('load', initializeFrame);
      if (frame.contentDocument?.readyState === 'complete') initializeFrame();

      function releaseAll() {
        [...pressed].forEach(name => sendKey(name, false));
        setFallbackSteering(0);
        releaseSteering();
        gas.classList.remove('pressed');
        reverse.classList.remove('pressed');
      }
      window.addEventListener('blur', releaseAll);
      document.addEventListener('visibilitychange', () => { if (document.hidden) releaseAll(); });
      window.addEventListener('pagehide', releaseAll);
      updateAudio();
    })();
  </script>
</body>
</html>
