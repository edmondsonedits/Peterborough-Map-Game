<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b2748">
  <title>Flying V Mobile Skate Sharpening</title>
  <style>
    html,body{margin:0;min-height:100%;background:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;color:#0b2748;font-weight:800;text-align:center;padding:24px}
  </style>
</head>
<body>
  <div class="loading">Loading Flying V…</div>
  <script>
    fetch('../flying-v-demo/index.html',{cache:'no-store'})
      .then(response=>{if(!response.ok)throw new Error('Unable to load site');return response.text()})
      .then(html=>{document.open();document.write(html);document.close();history.replaceState(null,'','./')})
      .catch(()=>{window.location.replace('../flying-v-demo/')});
  </script>
</body>
</html>
