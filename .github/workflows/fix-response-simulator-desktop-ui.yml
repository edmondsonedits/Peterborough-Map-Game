name: Fix response simulator desktop UI

# Updating this file automatically runs the repair; no manual GitHub action is required.
on:
  push:
    paths:
      - '.github/workflows/fix-response-simulator-desktop-ui.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repair encoding and desktop layout
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('response-simulator/index.html')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'â†\x90': '←',
              'â€”': '—',
              'Â°': '°',
              'â€²': '′',
              'â€³': '″',
          }
          for broken, fixed in replacements.items():
              text = text.replace(broken, fixed)

          desktop_css = r'''

        /* Desktop UI reliability fixes */
        #control-panel {
            width: min(360px, 30vw);
            min-width: 320px;
            max-width: 390px;
        }
        .panel-scroll {
            box-sizing: border-box;
            scrollbar-gutter: stable;
            overscroll-behavior: contain;
        }
        .station-spawn-box,
        .checkbox-row,
        .control-row label,
        .subtitle,
        .hud-meta {
            overflow-wrap: anywhere;
        }
        .control-row label > span:first-child {
            min-width: 0;
            padding-right: 12px;
        }
        .control-row label > span:last-child {
            flex: 0 0 auto;
        }
        @media (min-width: 901px) {
            body:has(#control-panel:not(.minimized)) #dispatch-hud {
                left: calc((100% - min(360px, 30vw)) / 2);
                max-width: calc(100vw - min(360px, 30vw) - 190px);
            }
            body:has(#control-panel:not(.minimized)) #map-orientation-controls {
                right: calc(min(360px, 30vw) + 15px);
            }
        }
        @media (max-width: 1100px) and (min-width: 601px) {
            #dispatch-hud {
                width: min(520px, calc(100vw - 210px));
            }
            #control-panel {
                width: 340px;
                min-width: 300px;
            }
        }
'''
          marker = '    </style>'
          if '/* Desktop UI reliability fixes */' not in text:
              text = text.replace(marker, desktop_css + '\n' + marker, 1)

          path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Commit repaired UI
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add response-simulator/index.html
          git commit -m "Fix response simulator desktop UI rendering"
          git push
