name: Fix response simulator desktop UI

on:
  push:
    paths:
      - '.github/workflows/fix-response-simulator-desktop-ui.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repair symbols and add version label
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('response-simulator/index.html')
          text = path.read_text(encoding='utf-8')

          text = re.sub(
              r'(<a id="game-home"[^>]*>).*?(</a>)',
              r'\g<1>&#8592; All Games\g<2>',
              text,
              count=1,
              flags=re.S,
          )

          station_labels = {
              'Station 1': 'Station 1 &mdash; 210 Sherbrooke St',
              'Station 2': 'Station 2 &mdash; 100 Marina Blvd',
              'Station 3': 'Station 3 &mdash; 839 Clonsilla Ave',
          }
          for station, replacement in station_labels.items():
              pattern = rf'(<button class="station-spawn-box" onclick="teleportToStation\([^>]+>){station}.*?(</button>)'
              text = re.sub(pattern, rf'\g<1>{replacement}\g<2>', text, count=1, flags=re.S)

          text = re.sub(
              r'(<span id="tel-hdg">).*?(</span>)',
              r'\g<1>180&deg;\g<2>',
              text,
              count=1,
              flags=re.S,
          )
          text = re.sub(
              r"document\.getElementById\('tel-hdg'\)\.innerText\s*=\s*Math\.round\(currentHeading\)\s*\+\s*[^;]+;",
              "document.getElementById('tel-hdg').innerText = Math.round(currentHeading) + '\\u00B0';",
              text,
          )

          text = re.sub(r'(<div class="hud-title"[^>]*>)[^A-Za-z<]*(ACTIVE ENROUTE DISPATCH:)', r'\g<1>\g<2>', text)
          text = re.sub(r'(<div class="hud-title"[^>]*>)[^A-Za-z<]*(ON SCENE AS REPORTED)', r'\g<1>\g<2>', text)

          version_css = '''
        .sim-version {
            margin-top: 18px;
            padding-top: 8px;
            border-top: 1px solid rgba(0,0,0,.08);
            color: #999;
            font-size: 9px;
            line-height: 1;
            letter-spacing: .45px;
            text-align: right;
            user-select: none;
        }
'''
          if '.sim-version {' not in text:
              text = text.replace('    </style>', version_css + '    </style>', 1)

          version_html = '            <div class="sim-version" aria-label="Simulator version 1.3.1">v1.3.1</div>\n'
          if 'class="sim-version"' not in text:
              panel_end = '        </div>\n    </div>\n\n    <div id="map-orientation-controls"'
              replacement = version_html + '        </div>\n    </div>\n\n    <div id="map-orientation-controls"'
              if panel_end not in text:
                  raise SystemExit('Could not locate options panel footer')
              text = text.replace(panel_end, replacement, 1)
          else:
              text = re.sub(r'(<div class="sim-version"[^>]*>).*?(</div>)', r'\g<1>v1.3.1\g<2>', text, count=1)
              text = re.sub(r'aria-label="Simulator version [^"]+"', 'aria-label="Simulator version 1.3.1"', text, count=1)

          path.write_text(text, encoding='utf-8', newline='\n')

          repaired = path.read_text(encoding='utf-8')
          required = [
              '&#8592; All Games',
              'Station 1 &mdash; 210 Sherbrooke St',
              'Station 2 &mdash; 100 Marina Blvd',
              'Station 3 &mdash; 839 Clonsilla Ave',
              '<span id="tel-hdg">180&deg;</span>',
              "Math.round(currentHeading) + '\\u00B0'",
              'class="sim-version"',
              '>v1.3.1</div>',
          ]
          missing = [item for item in required if item not in repaired]
          if missing:
              raise SystemExit('Verification failed; missing: ' + repr(missing))

          forbidden = ['â€”', 'Â°', 'â†']
          remaining = [item for item in forbidden if item in repaired]
          if remaining:
              raise SystemExit('Verification failed; corrupted symbols remain: ' + repr(remaining))
          PY

      - name: Commit verified repair
        run: |
          if git diff --quiet; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add response-simulator/index.html
          git commit -m "Add simulator version 1.3.1 and fix UI symbols"
          git push