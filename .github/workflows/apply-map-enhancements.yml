name: Apply map and Geo Guesser enhancements

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-map-enhancements.yml'

permissions:
  contents: write

jobs:
  apply-enhancements:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply targeted enhancements
        run: python tools/apply-map-enhancements.py

      - name: Validate HTML and JavaScript
        shell: bash
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re
          import subprocess
          import tempfile

          files = [Path('geo-guesser/index.html'), Path('response-simulator/index.html')]

          class IdParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == 'id' and value:
                          self.ids.append(value)

          for path in files:
              text = path.read_text(encoding='utf-8')
              parser = IdParser()
              parser.feed(text)
              duplicates = sorted({item for item in parser.ids if parser.ids.count(item) > 1})
              if duplicates:
                  raise SystemExit(f'{path}: duplicate IDs: {duplicates}')

              scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', text, flags=re.I | re.S)
              for index, script in enumerate(scripts):
                  with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as handle:
                      handle.write(script)
                      temp_path = handle.name
                  subprocess.run(['node', '--check', temp_path], check=True)

          geo = files[0].read_text(encoding='utf-8')
          simulator = files[1].read_text(encoding='utf-8')
          required_geo = ['continueAfterReview()', 'L.polyline([g,targetPoint]', 'VIEW RESULTS', 'map.fitBounds(bounds']
          required_sim = ['toggleHeadingUp()', 'mapPane.style.rotate', 'id="compass"', 'Heading Up']
          for token in required_geo:
              if token not in geo:
                  raise SystemExit(f'Geo Guesser validation missing: {token}')
          for token in required_sim:
              if token not in simulator:
                  raise SystemExit(f'Simulator validation missing: {token}')
          print('Static validation passed.')
          PY

      - name: Commit enhancements and remove one-time tooling
        shell: bash
        run: |
          rm -f tools/apply-map-enhancements.py .github/workflows/apply-map-enhancements.yml
          git config user.name "OpenAI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add geo-guesser/index.html response-simulator/index.html tools/apply-map-enhancements.py .github/workflows/apply-map-enhancements.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add heading-up map and Geo Guesser review"
          git push origin main
