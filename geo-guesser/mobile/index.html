<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121218">
  <title>Peterborough Geo Guesser — Mobile</title>
  <style>
    :root { color-scheme:dark; --panel:rgba(18,24,38,.94); --border:rgba(255,255,255,.2); --ink:#f8fafc; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; overscroll-behavior:none; background:#121218; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    #game-frame { position:fixed; inset:0; width:100%; height:100%; border:0; background:#121218; }
    .mobile-toolbar { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:10px; right:10px; z-index:6000; display:flex; justify-content:space-between; align-items:center; pointer-events:none; }
    .toolbar-button { min-width:46px; height:46px; display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:0 14px; color:var(--ink); border:1px solid var(--border); border-radius:14px; background:var(--panel); box-shadow:0 7px 22px rgba(0,0,0,.4); font:inherit; font-size:12px; font-weight:850; text-decoration:none; pointer-events:auto; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    .toolbar-button.icon-only { width:46px; min-width:46px; padding:0; }
    .toolbar-button:active { transform:scale(.95); }
    .toolbar-button:focus-visible { outline:3px solid #38bdf8; outline-offset:3px; }
    .toolbar-button.end { background:rgba(127,29,29,.96); border-color:rgba(248,113,113,.62); }
    .toolbar-button svg { width:23px; height:23px; stroke:currentColor; }
    .hidden { display:none!important; }
    .loading-cover { position:fixed; inset:0; z-index:7000; display:grid; place-items:center; padding:24px; color:var(--ink); background:#121218; text-align:center; transition:opacity 180ms ease; }
    .loading-cover.hidden { opacity:0; pointer-events:none; }
    .loading-cover strong { display:block; font-size:1.12rem; }
    .loading-cover span { display:block; margin-top:6px; color:#94a3b8; font-size:.88rem; }
    @media (min-width:901px) and (pointer:fine) { body::before { position:fixed; inset:0; z-index:8000; display:grid; place-items:center; padding:2rem; color:#fff; background:#121218; content:"Opening the desktop Geo Guesser…"; text-align:center; } }
    @media (prefers-reduced-motion:reduce) { *,*::before,*::after { transition-duration:.01ms!important; } }
  </style>
</head>
<body>
  <iframe id="game-frame" src="../index.html" title="Peterborough Geo Guesser"></iframe>
  <nav class="mobile-toolbar" aria-label="Geo Guesser controls">
    <a class="toolbar-button icon-only" href="../../" aria-label="Return to all games"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></a>
    <button class="toolbar-button end hidden" id="end-drill-button" type="button">End Drill</button>
  </nav>
  <div class="loading-cover" id="loading-cover" role="status"><div><strong>Loading Geo Guesser</strong><span>Preparing the mobile map interface…</span></div></div>
  <script>
    (()=>{
      const MOBILE_START_ZOOM=18;
      const isTouchMobile=window.innerWidth<=900&&(matchMedia('(pointer: coarse)').matches||'ontouchstart'in window);
      if(!isTouchMobile&&matchMedia('(pointer: fine)').matches){setTimeout(()=>location.replace('../'),700);return}
      const frame=document.getElementById('game-frame'),loadingCover=document.getElementById('loading-cover'),endDrillButton=document.getElementById('end-drill-button');
      const gameWindow=()=>frame.contentWindow;
      function repairText(root){const replacements=[['â†','←'],['â†’','→'],['â€”','—'],['Â·','·'],['Â©','©'],['â€™','’'],['ðŸŒŠ','🌊'],['ðŸš—','🚗'],['âœš','✚'],['ðŸ”¥','🔥']],walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT),nodes=[];while(walker.nextNode())nodes.push(walker.currentNode);nodes.forEach(node=>{let value=node.nodeValue;replacements.forEach(([bad,good])=>{value=value.split(bad).join(good)});if(value!==node.nodeValue)node.nodeValue=value})}
      function updateToolbar(){const sim=gameWindow(),doc=frame.contentDocument;if(!sim||!doc)return;const game=doc.getElementById('game'),state=typeof sim.mobileGeoGetState==='function'?sim.mobileGeoGetState():{};const showEnd=Boolean(game&&!game.classList.contains('hidden')&&state.gameMode==='open'&&!state.sessionEnded);endDrillButton.classList.toggle('hidden',!showEnd)}
      endDrillButton.addEventListener('click',()=>{const sim=gameWindow();if(sim&&typeof sim.endOpenDrill==='function')sim.endOpenDrill();updateToolbar()});
      frame.addEventListener('load',()=>{const sim=gameWindow(),doc=frame.contentDocument;if(!sim||!doc)return;
        const style=doc.createElement('style');style.textContent=`
          html,body{width:100%!important;height:100%!important;overscroll-behavior:none!important}
          #game-home,#end-drill{display:none!important}
          #game.screen{padding:0!important;background:#121218!important}
          #game .map-container,#map{width:100vw!important;height:100dvh!important}
          #header{top:calc(66px + env(safe-area-inset-top))!important;left:10px!important;right:10px!important;width:auto!important;transform:none!important;padding:12px 14px!important;border-radius:15px!important;background:rgba(22,28,42,.94)!important;text-align:left!important;pointer-events:none!important}
          #call-type{font-size:11px!important;letter-spacing:.75px!important}#call-icon{font-size:13px!important}#call-name{margin:4px 0 2px!important;font-size:20px!important;line-height:1.12!important}#call-address{font-size:14px!important;line-height:1.25!important}#timer{margin-top:8px!important;padding-top:7px!important;font-size:12px!important}#progress{margin-top:7px!important}.progress-dot{width:7px!important;height:7px!important}
          #dispatch-card{top:53%!important;left:16px!important;right:16px!important;bottom:auto!important;width:auto!important;max-width:390px!important;margin:0 auto!important;padding:20px 18px 18px!important;transform:translateY(-50%)!important;border-radius:18px!important;background:rgba(28,33,48,.96)!important}
          #dispatch-icon{width:52px!important;height:52px!important;margin-bottom:10px!important;font-size:1.5rem!important}#dispatch-type{font-size:12px!important;line-height:1.35!important}#dispatch-name{margin:9px 0 5px!important;font-size:clamp(1.55rem,7vw,2rem)!important;line-height:1.12!important}#dispatch-address{font-size:1rem!important;line-height:1.35!important}#dispatch-meta{margin:16px 0 13px!important;padding-top:12px!important;font-size:12px!important}#dispatch-start{min-height:56px!important;padding:12px!important;border-radius:14px!important;font-size:1rem!important}
          #reticle{width:48px!important;height:48px!important}#reticle:after{inset:18px!important}
          #confirm{bottom:calc(20px + env(safe-area-inset-bottom))!important;width:min(76vw,330px)!important;min-height:58px!important;padding:12px 24px!important;border-radius:999px!important;font-size:1rem!important}
          #feedback{top:calc(205px + env(safe-area-inset-top))!important;width:calc(100% - 28px)!important;padding:12px 16px!important;border-radius:14px!important}
          .leaflet-bottom{bottom:calc(86px + env(safe-area-inset-bottom))!important}.leaflet-control-attribution{max-width:88vw!important;font-size:9px!important;white-space:normal!important}.leaflet-control-scale{margin-left:10px!important}
          @media(max-height:700px){#header{top:calc(62px + env(safe-area-inset-top))!important}#dispatch-card{top:55%!important;padding-top:16px!important}#dispatch-icon{width:44px!important;height:44px!important}#dispatch-name{font-size:1.45rem!important}}
        `;doc.head.appendChild(style);
        const helper=doc.createElement('script');helper.textContent=`(()=>{const Z=${MOBILE_START_ZOOM};window.mobileGeoGetState=()=>({gameMode,sessionEnded});window.mobileGeoSetRoundZoom=()=>{if(!map||!station)return;map.setMaxZoom(19);map.setView([station.lat,station.lng],Z,{animate:false});if(!window.mobileGeoScale){window.mobileGeoScale=L.control.scale({metric:true,imperial:false,position:'bottomleft'}).addTo(map)}};callStyle=function(loc){if(loc.sub==='Water & Ice Rescue')return{key:'water',icon:'🌊'};if(loc.sub==='Motor Vehicle Collision')return{key:'mvc',icon:'🚗'};if(loc.main==='Medical')return{key:'medical',icon:'✚'};return{key:'fire',icon:'🔥'}};window.callStyle=callStyle;const originalStart=start;start=function(...args){const result=originalStart.apply(this,args);setTimeout(window.mobileGeoSetRoundZoom,0);return result};window.start=start;const originalPrepare=prepareDispatch;prepareDispatch=function(...args){const result=originalPrepare.apply(this,args);setTimeout(window.mobileGeoSetRoundZoom,0);return result};window.prepareDispatch=prepareDispatch;const originalLoad=loadCall;loadCall=function(...args){const result=originalLoad.apply(this,args);setTimeout(window.mobileGeoSetRoundZoom,0);return result};window.loadCall=loadCall;})();`;doc.body.appendChild(helper);
        const dispatchStart=doc.getElementById('dispatch-start');
        if(dispatchStart){dispatchStart.addEventListener('click',()=>{const keepZoom=()=>{const current=gameWindow();if(current&&typeof current.mobileGeoSetRoundZoom==='function')current.mobileGeoSetRoundZoom()};requestAnimationFrame(keepZoom);setTimeout(keepZoom,80)})}
        repairText(doc.body);const observer=new MutationObserver(()=>{repairText(doc.body);updateToolbar()});observer.observe(doc.body,{childList:true,subtree:true,characterData:true,attributes:true,attributeFilter:['class']});updateToolbar();loadingCover.classList.add('hidden');setTimeout(()=>loadingCover.remove(),250)
      })
    })();
  </script>
</body>
</html>
